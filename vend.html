<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propiedades Vendidas — prueba ID 4 — REMAX Argentina</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #cc0000;
      color: white;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 13px; opacity: 0.85; }

    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }

    .filters-box {
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .filters-box h2 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: #333; }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }

    input, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #cc0000; }

    .btn-buscar {
      width: 100%;
      padding: 11px;
      background: #cc0000;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .btn-buscar:hover { background: #aa0000; }
    .btn-buscar:active { background: #990000; transform: scale(0.99); }

    .results-meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-meta strong { color: #1a1a1a; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      overflow: hidden;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }

    .card-body { padding: 1rem; }

    .badge-vendida {
      display: inline-block;
      background: #f0f8ff;
      color: #cc0000;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #cce0ff;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.45;
      margin-bottom: 5px;
    }

    .card-addr {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .card-addr svg { flex-shrink: 0; margin-top: 1px; }

    .card-price {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 2px;
    }
    .card-expenses {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .card-features {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .feature-pill {
      font-size: 11px;
      background: #f5f5f3;
      color: #555;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid #e5e5e5;
    }

    .card-footer {
      border-top: 1px solid #f0f0f0;
      padding: 10px 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-agent { font-size: 11px; color: #aaa; }
    .card-link {
      font-size: 12px;
      font-weight: 600;
      color: #cc0000;
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2rem;
      padding-bottom: 2rem;
    }
    .btn-page {
      padding: 8px 18px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .btn-page:hover { background: #f5f5f3; }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 13px; color: #666; }

    .state-box {
      text-align: center;
      padding: 3rem 1rem;
      color: #aaa;
      font-size: 14px;
    }
    .state-box .icon { font-size: 32px; margin-bottom: 10px; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #f0f0f0;
      border-top-color: #cc0000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Propiedades Vendidas — prueba ID 4</h1>
    <span>REMAX Argentina — datos en tiempo real</span>
  </div>
</header>

<div class="container">

  <div class="filters-box">
    <h2>Filtros de búsqueda</h2>

    <div class="filters-grid">
      <div>
        <label for="zona">Zona / ciudad / barrio</label>
        <input type="text" id="zona" placeholder="Ej: Morón, Palermo..." />
      </div>
      <div>
        <label for="operacion">Operación</label>
        <select id="operacion">
          <option value="1,2">Venta y alquiler</option>
          <option value="1">Solo venta</option>
          <option value="2">Solo alquiler</option>
        </select>
      </div>
      <div>
        <label for="tipo">Tipo de propiedad</label>
        <select id="tipo">
          <option value="">Todos</option>
          <option value="2">Departamento</option>
          <option value="9">Casa</option>
          <option value="18">Terreno / lote</option>
          <option value="17">Local</option>
          <option value="16">Oficina</option>
          <option value="12">PH</option>
          <option value="23">Quinta</option>
          <option value="22">Galpón</option>
        </select>
      </div>
      <div>
        <label for="moneda">Moneda</label>
        <select id="moneda">
          <option value="">Cualquiera</option>
          <option value="1">USD</option>
          <option value="2">ARS</option>
        </select>
      </div>
    </div>

    <div class="filters-grid">
      <div>
        <label for="precioMin">Precio mínimo</label>
        <input type="number" id="precioMin" placeholder="0" />
      </div>
      <div>
        <label for="precioMax">Precio máximo</label>
        <input type="number" id="precioMax" placeholder="Sin límite" />
      </div>
      <div>
        <label for="ambientes">Ambientes</label>
        <select id="ambientes">
          <option value="">Cualquiera</option>
          <option value="1">1 ambiente</option>
          <option value="2">2 ambientes</option>
          <option value="3">3 ambientes</option>
          <option value="4">4 o más</option>
        </select>
      </div>
      <div>
        <label for="orden">Ordenar por</label>
        <select id="orden">
          <option value="-createdAt">Más recientes</option>
          <option value="+price">Menor precio</option>
          <option value="-price">Mayor precio</option>
          <option value="+id">ID ascendente</option>
        </select>
      </div>
    </div>

    <button class="btn-buscar" id="btnBuscar">Buscar propiedades vendidas</button>
  </div>

  <div id="output"></div>

</div>

<script>
  let currentPage = 0;
  let totalPages = 1;

  function buildURL(page) {
    const zona     = document.getElementById('zona').value.trim();
    const op       = document.getElementById('operacion').value;
    const tipo     = document.getElementById('tipo').value;
    const moneda   = document.getElementById('moneda').value;
    const precioMin = document.getElementById('precioMin').value;
    const precioMax = document.getElementById('precioMax').value;
    const ambientes = document.getElementById('ambientes').value;
    const orden    = document.getElementById('orden').value;

    let url = `https://api-ar.redremax.com/remaxweb-ar/api/listings/findAllWithEntrepreneurships`
            + `?page=${page}&pageSize=21&sort=${orden}`
            + `&in=operationId:${op}`
            + `&in=listingStatusId:4`
            + `&in=eStageId:0,1,2,3,4`;

    if (tipo)      url += `&in=listingTypeId:${tipo}`;
    if (moneda)    url += `&in=currencyId:${moneda}`;
    if (precioMin) url += `&gte=price:${precioMin}`;
    if (precioMax) url += `&lte=price:${precioMax}`;
    if (ambientes === '4') url += `&gte=totalRooms:4`;
    else if (ambientes)    url += `&in=totalRooms:${ambientes}`;
    if (zona)      url += `&q=${encodeURIComponent(zona)}`;

    return url;
  }

  function formatPrice(p) {
    if (!p.priceExposure) return 'Precio a consultar';
    return `${Number(p.price).toLocaleString('es-AR')} ${p.currency.value}`;
  }

  function renderCards(props) {
    return props.map(p => {
      const precio   = formatPrice(p);
      const expenses = p.expensesPrice ? `+ ${Number(p.expensesPrice).toLocaleString('es-AR')} ARS expensas` : '';
      const feats    = [];
      if (p.totalRooms)          feats.push(`${p.totalRooms} amb.`);
      if (p.bedrooms)            feats.push(`${p.bedrooms} dorm.`);
      if (p.bathrooms)           feats.push(`${p.bathrooms} baño${p.bathrooms > 1 ? 's' : ''}`);
      if (p.dimensionTotalBuilt) feats.push(`${p.dimensionTotalBuilt} m²`);
      if (p.dimensionLand > 0)   feats.push(`${p.dimensionLand} m² terreno`);

      const slug = `https://www.remax.com.ar/listings/${p.slug}`;
      const agente = p.associate ? p.associate.name : '';
      const oficina = p.associate ? p.associate.officeName : '';

      return `
      <div class="card">
        <div class="card-body">
          <span class="badge-vendida">Vendida</span>
          <div class="card-title">${escHtml(p.title)}</div>
          <div class="card-addr">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
            ${escHtml(p.displayAddress)} — ${escHtml(p.geoLabel)}
          </div>
          <div class="card-price">${precio}</div>
          ${expenses ? `<div class="card-expenses">${expenses}</div>` : ''}
          ${feats.length ? `<div class="card-features">${feats.map(f => `<span class="feature-pill">${f}</span>`).join('')}</div>` : ''}
        </div>
        <div class="card-footer">
          <div class="card-agent">${escHtml(agente)}<br><span style="color:#ccc">${escHtml(oficina)}</span></div>
          <a class="card-link" href="${slug}" target="_blank" rel="noopener">Ver aviso →</a>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function buscar(page = 0) {
    currentPage = page;
    const output = document.getElementById('output');
    output.innerHTML = `<div class="state-box"><div class="spinner"></div>Buscando propiedades vendidas...</div>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });

    try {
      const res  = await fetch(buildURL(page));
      const json = await res.json();
      const props = json.data.data || [];
      const total = json.data.totalItems || 0;
      totalPages  = json.data.totalPages || 1;

      if (!props.length) {
        output.innerHTML = `<div class="state-box"><div class="icon">🔍</div>No se encontraron propiedades vendidas con esos filtros.<br>Probá ampliar la búsqueda.</div>`;
        return;
      }

      const maxPage = Math.min(totalPages, 50);

      output.innerHTML = `
        <div class="results-meta">
          <span><strong>${Number(total).toLocaleString('es-AR')}</strong> propiedades vendidas encontradas</span>
          <span>Página ${page + 1} de ${maxPage}</span>
        </div>
        <div class="cards">${renderCards(props)}</div>
        <div class="pagination">
          <button class="btn-page" id="btnPrev" ${page === 0 ? 'disabled' : ''} onclick="buscar(${page - 1})">← Anterior</button>
          <span class="page-info">Pág. ${page + 1} / ${maxPage}</span>
          <button class="btn-page" id="btnNext" ${page >= maxPage - 1 ? 'disabled' : ''} onclick="buscar(${page + 1})">Siguiente →</button>
        </div>`;

    } catch(e) {
      output.innerHTML = `<div class="state-box"><div class="icon">⚠️</div>Error al conectar con la API de REMAX.<br>Verificá tu conexión e intentá de nuevo.</div>`;
      console.error(e);
    }
  }

  document.getElementById('btnBuscar').addEventListener('click', () => buscar(0));
  document.getElementById('zona').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar(0);
  });

  buscar(0);
</script>

</body>
</html>
