<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  /* CURSOR */
  const cursor = document.getElementById('cursor');
  const cursorRing = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    setTimeout(() => {
      cursorRing.style.left = e.clientX + 'px';
      cursorRing.style.top  = e.clientY + 'px';
    }, 80);
  });
  document.querySelectorAll('a, button, .photo-cell').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursorRing.style.transform = 'translate(-50%,-50%) scale(1.8)';
      cursor.style.transform     = 'translate(-50%,-50%) scale(0.5)';
    });
    el.addEventListener('mouseleave', () => {
      cursorRing.style.transform = 'translate(-50%,-50%) scale(1)';
      cursor.style.transform     = 'translate(-50%,-50%) scale(1)';
    });
  });

  /* SCROLL NAV */
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
  });

  /* REVEAL */
  const revealEls = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
  const observer  = new IntersectionObserver(entries => {
    entries.forEach(e => e.isIntersecting
      ? e.target.classList.add('visible')
      : e.target.classList.remove('visible'));
  }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
  revealEls.forEach(el => observer.observe(el));
  
  /* PLACEHOLDERS Y LINKS DEL FORM */

  document.getElementById('btn-submit').textContent = TEXTOS.FORM_BOTON;
  document.getElementById('footer-link1').textContent = TEXTOS.FOOTER_LINK1_TEXTO;
  document.getElementById('footer-link1').href = TEXTOS.FOOTER_LINK1_URL;
  document.getElementById('footer-link2').textContent = TEXTOS.FOOTER_LINK2_TEXTO;
  document.getElementById('footer-link2').href = TEXTOS.FOOTER_LINK2_URL;
  document.getElementById('footer-link3').textContent = TEXTOS.FOOTER_LINK3_TEXTO;
  document.getElementById('footer-link3').href = TEXTOS.FOOTER_LINK3_URL;

  /* MAPA */
  const map = L.map('map', { center: [TEXTOS.MAPA_LAT, TEXTOS.MAPA_LNG], zoom: TEXTOS.MAPA_ZOOM, zoomControl: false, scrollWheelZoom: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

  const goldIcon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:#c9a55a;border-radius:50%;border:3px solid rgba(201,165,90,0.3);box-shadow:0 0 0 6px rgba(201,165,90,0.15)"></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });

  L.marker([TEXTOS.MAPA_LAT, TEXTOS.MAPA_LNG], { icon: goldIcon }).addTo(map)
   .bindPopup('<b style="font-family:serif">' + TEXTOS.UBICACION_POPUP + '</b><br>' + TEXTOS.UBICACION_DIRECCION);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
</script>
