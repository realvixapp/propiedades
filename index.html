<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tasador Inteligente</title>
<style>
  body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
  .box { max-width:500px; margin:50px auto; padding:20px; background:#1e293b; border-radius:10px; }
  input, select, button {
    width:100%; padding:10px; margin:10px 0; border-radius:5px; border:none;
  }
  button { background:#22c55e; color:white; cursor:pointer; }
  .hidden { display:none; }
</style>
</head>

<body>

<div class="box">

  <!-- STEP 1 -->
  <div id="step1">
    <h2>¿Cuánto vale tu propiedad?</h2>
    <p>Descubrilo en menos de 30 segundos</p>

    <select id="zona">
      <option value="1200">Zona Premium</option>
      <option value="900">Zona Media</option>
      <option value="700">Zona Baja</option>
    </select>

    <select id="tipo">
      <option>Departamento</option>
      <option>Casa</option>
      <option>PH</option>
    </select>

    <button onclick="nextStep(2)">Continuar</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="hidden">
    <h2>Características</h2>

    <input type="number" id="m2" placeholder="Metros cuadrados">

    <select id="estado">
      <option value="0.1">Excelente</option>
      <option value="0">Bueno</option>
      <option value="-0.2">A refaccionar</option>
    </select>

    <select id="antiguedad">
      <option value="0.05">Menos de 10 años</option>
      <option value="0">10 a 30 años</option>
      <option value="-0.1">Más de 30 años</option>
    </select>

    <button onclick="nextStep(3)">Continuar</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3" class="hidden">
    <h2>Diferenciales</h2>

    <label><input type="checkbox" id="cochera"> Cochera</label><br>
    <label><input type="checkbox" id="balcon"> Balcón/Patio</label><br>
    <label><input type="checkbox" id="amenities"> Amenities</label>

    <button onclick="nextStep(4)">Continuar</button>
  </div>

  <!-- STEP 4 LEAD -->
  <div id="step4" class="hidden">
    <h2>Tu tasación está lista</h2>
    <p>¿Dónde te la enviamos?</p>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="whatsapp" placeholder="WhatsApp">
    <input type="email" id="email" placeholder="Email">

    <button onclick="calcular()">Ver resultado</button>
  </div>

  <!-- RESULT -->
  <div id="resultado" class="hidden">
    <h2>Resultado estimado</h2>
    <p id="valor"></p>

    <p>Propiedades similares se venden en 45 a 60 días</p>

    <button onclick="alert('Agendar visita')">Agendar tasación exacta</button>
  </div>

</div>

<script>

function nextStep(step) {
  document.querySelectorAll(".box > div").forEach(div => div.classList.add("hidden"));
  document.getElementById("step" + step).classList.remove("hidden");
}

function calcular() {

  let m2 = parseFloat(document.getElementById("m2").value);
  let valorM2 = parseFloat(document.getElementById("zona").value);

  let estado = parseFloat(document.getElementById("estado").value);
  let antiguedad = parseFloat(document.getElementById("antiguedad").value);

  let ajuste = 1 + estado + antiguedad;

  if (document.getElementById("cochera").checked) ajuste += 0.05;
  if (document.getElementById("balcon").checked) ajuste += 0.03;
  if (document.getElementById("amenities").checked) ajuste += 0.05;

  let valorBase = m2 * valorM2;
  let valorFinal = valorBase * ajuste;

  let min = Math.round(valorFinal * 0.9);
  let max = Math.round(valorFinal * 1.1);

  document.getElementById("valor").innerText =
    "Entre USD " + min.toLocaleString() + " y USD " + max.toLocaleString();

  nextStep("resultado");

  // 🔥 ACA GUARDAS EL LEAD (ejemplo consola)
  let lead = {
    nombre: document.getElementById("nombre").value,
    whatsapp: document.getElementById("whatsapp").value,
    email: document.getElementById("email").value,
    valor_estimado: valorFinal
  };

  console.log("Nuevo lead:", lead);

  // 👉 ACÁ podés mandar a:
  // - Google Sheets
  // - CRM
  // - WhatsApp API

}

</script>

</body>
</html>
