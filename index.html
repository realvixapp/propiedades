<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasador Inteligente</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

    header { background: #1a1a2e; color: white; padding: 1.25rem 2rem; }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 13px; opacity: 0.7; }

    .container { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }

    .card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; color: #333; }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }

    input, select {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; background: white; color: #1a1a1a;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #1a1a2e; }

    .autocomplete-wrap { position: relative; }
    .autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 0; background: white;
      border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px;
      max-height: 220px; overflow-y: auto; z-index: 100; display: none;
    }
    .autocomplete-list.open { display: block; }
    .ac-item {
      padding: 9px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f5f5f5;
      display: flex; flex-direction: column; gap: 2px;
    }
    .ac-item:hover, .ac-item.selected { background: #f0f0f8; }
    .ac-item strong { font-size: 13px; font-weight: 600; color: #1a1a1a; }
    .ac-item span { font-size: 11px; color: #999; }

    .btn {
      width: 100%; padding: 12px; background: #1a1a2e; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #2a2a4e; }

    .resultado { display: none; }
    .resultado.visible { display: block; }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: #f8f8f6; border-radius: 10px; padding: 1rem; text-align: center; }
    .metric .val { font-size: 22px; font-weight: 700; color: #1a1a2e; }
    .metric .lbl { font-size: 12px; color: #888; margin-top: 4px; }
    .metric.highlight { background: #1a1a2e; }
    .metric.highlight .val { color: white; }
    .metric.highlight .lbl { color: #aaa; }

    .refs-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #333; }
    .ref-list { display: flex; flex-direction: column; gap: 8px; }
    .ref-item {
      background: #f8f8f6; border-radius: 8px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .ref-item .ref-info { font-size: 13px; color: #444; flex: 1; min-width: 200px; }
    .ref-item .ref-precio { font-size: 14px; font-weight: 700; color: #1a1a2e; white-space: nowrap; }
    .ref-item .ref-m2 { font-size: 12px; color: #999; }
    .badge-ref { display: inline-block; background: #e8f4e8; color: #2a6e2a; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }

    .state-box { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
    .spinner { width: 26px; height: 26px; border: 3px solid #eee; border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .disclaimer { font-size: 11px; color: #bbb; margin-top: 1rem; text-align: center; }

    @media (max-width: 600px) {
      .metrics { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Tasador Inteligente</h1>
  <span>Estimación de valor de mercado en tiempo real</span>
</header>

<div class="container">

  <div class="card">
    <h2>Datos de la propiedad a tasar</h2>
    <div class="form-grid">
      <div>
        <label>Zona / Localidad</label>
        <div class="autocomplete-wrap">
          <input type="text" id="zonaInput" placeholder="Ej: Castelar, Palermo..." autocomplete="off" />
          <div class="autocomplete-list" id="acList"></div>
        </div>
        <input type="hidden" id="zonaValor" />
      </div>
      <div>
        <label>Tipo de propiedad</label>
        <select id="tipo">
          <option value="2">Departamento</option>
          <option value="9">Casa</option>
          <option value="12">PH</option>
          <option value="18">Terreno / lote</option>
          <option value="17">Local</option>
          <option value="16">Oficina</option>
        </select>
      </div>
      <div>
        <label>Superficie (m²)</label>
        <input type="number" id="metros" placeholder="Ej: 65" min="1" />
      </div>
      <div>
        <label>Moneda de referencia</label>
        <select id="moneda">
          <option value="1">USD</option>
          <option value="2">ARS</option>
        </select>
      </div>
    </div>
    <button class="btn" id="btnTasar">Calcular tasación</button>
  </div>

  <div class="card resultado" id="resultado">
    <div id="resultadoContenido"></div>
  </div>

</div>

<script>
  let zonaSeleccionada = null;
  let acTimeout = null;
  let acItems = [];
  let acIndex = -1;

  const zonaInput = document.getElementById('zonaInput');
  const acList = document.getElementById('acList');

  async function buscarZonas(q) {
    if (q.length < 2) { cerrarAC(); return; }
    try {
      const url = `https://api-ar.redremax.com/remaxweb-ar/api/geoReference/findAll?q=${encodeURIComponent(q)}&page=0&pageSize=10`;
      const res = await fetch(url);
      const json = await res.json();
      const items = json.data?.data || [];
      mostrarAC(items);
    } catch(e) {
      // fallback: usar texto libre
      zonaSeleccionada = q;
    }
  }

  function mostrarAC(items) {
    acItems = items;
    acIndex = -1;
    if (!items.length) { cerrarAC(); return; }
    acList.innerHTML = items.map((it, i) => `
      <div class="ac-item" data-i="${i}" data-label="${escHtml(it.label || it.name || '')}" data-value="${escHtml(it.label || it.name || '')}">
        <strong>${escHtml(it.label || it.name || '')}</strong>
        ${it.parent ? `<span>${escHtml(it.parent)}</span>` : ''}
      </div>`).join('');
    acList.classList.add('open');
    acList.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        seleccionar(el.dataset.label, el.dataset.value);
      });
    });
  }

  function seleccionar(label, value) {
    zonaInput.value = label;
    zonaSeleccionada = value;
    cerrarAC();
  }

  function cerrarAC() {
    acList.classList.remove('open');
    acItems = [];
    acIndex = -1;
  }

  zonaInput.addEventListener('input', () => {
    zonaSeleccionada = null;
    clearTimeout(acTimeout);
    acTimeout = setTimeout(() => buscarZonas(zonaInput.value.trim()), 280);
  });

  zonaInput.addEventListener('keydown', e => {
    const items = acList.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIndex = Math.min(acIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('selected', i === acIndex));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIndex = Math.max(acIndex - 1, 0);
      items.forEach((el, i) => el.classList.toggle('selected', i === acIndex));
    } else if (e.key === 'Enter' && acIndex >= 0) {
      e.preventDefault();
      const sel = items[acIndex];
      if (sel) seleccionar(sel.dataset.label, sel.dataset.value);
    } else if (e.key === 'Escape') {
      cerrarAC();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrap')) cerrarAC();
  });

  async function tasar() {
    const zona = zonaSeleccionada || zonaInput.value.trim();
    const tipo = document.getElementById('tipo').value;
    const metros = parseFloat(document.getElementById('metros').value);
    const moneda = document.getElementById('moneda').value;

    if (!zona) { alert('Ingresá una zona'); return; }
    if (!metros || metros <= 0) { alert('Ingresá los metros cuadrados'); return; }

    const resultado = document.getElementById('resultado');
    const contenido = document.getElementById('resultadoContenido');
    resultado.classList.add('visible');
    contenido.innerHTML = `<div class="state-box"><div class="spinner"></div>Analizando el mercado...</div>`;

    try {
      const url = `https://api-ar.redremax.com/remaxweb-ar/api/listings/findAllWithEntrepreneurships`
                + `?page=0&pageSize=100&sort=-createdAt`
                + `&in=operationId:1`
                + `&in=listingStatusId:2`
                + `&in=eStageId:0,1,2,3,4`
                + `&in=listingTypeId:${tipo}`
                + `&in=currencyId:${moneda}`
                + `&q=${encodeURIComponent(zona)}`;

      const res = await fetch(url);
      const json = await res.json();
      let props = (json.data?.data || []).filter(p =>
        p.priceExposure &&
        p.price > 0 &&
        p.dimensionTotalBuilt > 0
      );

      if (props.length < 3) {
        contenido.innerHTML = `<div class="state-box">No hay suficientes referencias en esa zona para calcular una tasación.<br>Probá con una zona más amplia o cambiá el tipo de propiedad.</div>`;
        return;
      }

      const preciosPorM2 = props.map(p => p.price / p.dimensionTotalBuilt);
      preciosPorM2.sort((a, b) => a - b);

      // quitar outliers extremos (10% de cada lado)
      const corte = Math.floor(preciosPorM2.length * 0.1);
      const limpios = preciosPorM2.slice(corte, preciosPorM2.length - corte);

      const promedio = limpios.reduce((a, b) => a + b, 0) / limpios.length;
      const min = limpios[0];
      const max = limpios[limpios.length - 1];

      const valorEstimado = Math.round(promedio * metros);
      const valorConservador = Math.round(valorEstimado * 0.90);
      const simbolo = moneda === '1' ? 'USD' : 'ARS';

      const refsMostrar = props.slice(0, 6);

      contenido.innerHTML = `
        <h2 style="margin-bottom:1.25rem;">Resultado de tasación</h2>

        <div class="metrics">
          <div class="metric">
            <div class="val">${Math.round(promedio).toLocaleString('es-AR')} ${simbolo}</div>
            <div class="lbl">Precio promedio por m²</div>
          </div>
          <div class="metric">
            <div class="val">${Math.round(min).toLocaleString('es-AR')} – ${Math.round(max).toLocaleString('es-AR')}</div>
            <div class="lbl">Rango del mercado por m²</div>
          </div>
          <div class="metric">
            <div class="val">${valorEstimado.toLocaleString('es-AR')} ${simbolo}</div>
            <div class="lbl">Valor estimado (${metros} m²)</div>
          </div>
          <div class="metric highlight">
            <div class="val">${valorConservador.toLocaleString('es-AR')} ${simbolo}</div>
            <div class="lbl">Tasación conservadora (−10%)</div>
          </div>
        </div>

        <div class="refs-title">Propiedades de referencia (${props.length} comparables encontradas)</div>
        <div class="ref-list">
          ${refsMostrar.map(p => {
            const pm2 = Math.round(p.price / p.dimensionTotalBuilt);
            return `
            <div class="ref-item">
              <div class="ref-info">
                ${escHtml(p.displayAddress)} — ${escHtml(p.geoLabel)}
                <span class="badge-ref">Referencia</span>
                <div class="ref-m2">${p.dimensionTotalBuilt} m² · ${p.totalRooms ? p.totalRooms + ' amb.' : ''}</div>
              </div>
              <div>
                <div class="ref-precio">${p.price.toLocaleString('es-AR')} ${simbolo}</div>
                <div class="ref-m2" style="text-align:right">${pm2.toLocaleString('es-AR')} ${simbolo}/m²</div>
              </div>
            </div>`;
          }).join('')}
        </div>

        <p class="disclaimer">Estimación basada en ${props.length} operaciones de referencia en la zona. Los valores son orientativos.</p>
      `;

    } catch(e) {
      contenido.innerHTML = `<div class="state-box">Error al obtener datos. Verificá tu conexión e intentá de nuevo.</div>`;
    }
  }

  document.getElementById('btnTasar').addEventListener('click', tasar);
  zonaInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !acList.classList.contains('open')) tasar(); });

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
